name: StadiumIQ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Dependencies
      run: |
        cd backend && npm ci
        cd ../frontend && npm ci
        
    - name: Test Backend
      run: cd backend && npm test
      
    - name: Test Frontend
      run: cd frontend && npm test
      
    - name: Build Project
      run: |
        cd backend && npx prisma generate && npm run build
        cd ../frontend && npm run build
