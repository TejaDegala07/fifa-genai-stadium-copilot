version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - JWT_SECRET=stadiumiq-hackathon-super-secret-key-2026
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=file:./dev.db
    volumes:
      - ./backend/prisma:/app/prisma

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
